version: "3.9"

services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tidebook
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: tidebook_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidebook"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
